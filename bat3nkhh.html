<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Invited!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0533 0%, #3b0f6e 40%, #7b2ff7 80%, #f72585 100%);
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: #f72585; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 350px; height: 350px; background: #7b2ff7; bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 250px; height: 250px; background: #00d4ff; top: 50%; left: 50%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -20px;
      border-radius: 2px;
      animation: confetti-fall linear infinite;
      pointer-events: none;
      opacity: 0;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    .card {
      position: relative;
      width: 520px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      padding: 50px 44px 44px;
      color: #fff;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
      z-index: 10;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(60px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .ribbon {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 5px;
      background: linear-gradient(90deg, #f72585, #7b2ff7, #00d4ff);
      border-radius: 0 0 8px 8px;
      box-shadow: 0 0 20px #f72585aa;
    }

    .emoji-top {
      text-align: center;
      font-size: 44px;
      margin-bottom: 12px;
      animation: pop 0.6s 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      text-align: center;
      background: linear-gradient(90deg, #f72585, #bf5af2, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }
    .divider span { font-size: 18px; }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .detail-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 16px;
      transition: background 0.3s;
    }
    .detail-box:hover { background: rgba(255,255,255,0.13); }
    .detail-box .icon { font-size: 22px; margin-bottom: 6px; }
    .detail-box .label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 3px;
    }
    .detail-box .value { font-size: 0.95rem; font-weight: 700; }

    .message {
      text-align: center;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.7);
      font-style: italic;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 14px;
      font-family: 'Lato', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: translateY(0) scale(0.97); }

    .btn-accept {
      background: linear-gradient(135deg, #f72585, #b5179e);
      color: #fff;
      box-shadow: 0 8px 24px rgba(247,37,133,0.45);
    }
    .btn-accept:hover { box-shadow: 0 12px 32px rgba(247,37,133,0.65); }

    .btn-decline {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-decline:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

    .btn-calendar {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7b2ff7, #00d4ff);
      color: #fff;
      box-shadow: 0 8px 24px rgba(123,47,247,0.45);
    }
    .btn-calendar:hover { box-shadow: 0 12px 32px rgba(123,47,247,0.65); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: linear-gradient(145deg, #1e0545, #3b0f6e);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 40px 36px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: modalIn 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal .modal-emoji { font-size: 56px; margin-bottom: 16px; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #fff; margin-bottom: 10px; }
    .modal p  { font-size: 0.9rem; color: rgba(255,255,255,0.65); margin-bottom: 24px; line-height: 1.6; }
    .btn-close {
      padding: 12px 32px;
      background: linear-gradient(135deg, #f72585, #7b2ff7);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn-close:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(247,37,133,0.5); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #7b2ff7, #f72585);
      color: #fff;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">
    <div class="ribbon"></div>
    <div class="emoji-top">🎉</div>
    <h1>Урилга!</h1>
    <p class="subtitle">Маш өвөрмөц тэмдэглэх болно</p>

    <div class="divider"><span>✦</span></div>

    <div class="details-grid">
      <div class="detail-box">
        <div class="icon">🎂</div>
        <div class="label">Баяр</div>
        <div class="value">Халиунаа-ийн BDAY</div>
      </div>
      <div class="detail-box">
        <div class="icon">📅</div>
        <div class="label">Хэзээ</div>
        <div class="value">7-7, 2026</div>
      </div>
      <div class="detail-box">
        <div class="icon">⏰</div>
        <div class="label">Хэдээс</div>
        <div class="value">15:00 – 20:00</div>
      </div>
      <div class="detail-box">
        <div class="icon">📍</div>
        <div class="label">Хаана</div>
        <div class="value">Shangri-La mall Ruby Room restaurant</div>
      </div>
    </div>

    <p class="message">
      "Баяр хөөр, дурсамжаар дүүрсэн үдшийг өнгөрүүлье."
    </p>

    <div class="btn-row">
      <button class="btn btn-accept" onclick="respond('accept')">✓ &nbsp;Очноо</button>
      <button class="btn btn-decline" onclick="respond('decline')">✗ &nbsp;Амжихгүй</button>
    </div>
    <button class="btn btn-calendar" onclick="addToCalendar()">📆 &nbsp;Calender-д тэмдэглэх</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-emoji" id="modal-emoji">🎊</div>
      <h2 id="modal-title">Woohoo!</h2>
      <p id="modal-msg">Удахгүй уулзацгаая!</p>
      <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const colors = ['#f72585','#7b2ff7','#00d4ff','#ffe14d','#ff6b6b','#a8ff78'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${4 + Math.random() * 6}s;
        animation-delay: ${Math.random() * 6}s;
        opacity: 0;
      `;
      document.body.appendChild(el);
    }

    function openModal(emoji, title, msg) {
      document.getElementById('modal-emoji').textContent = emoji;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-msg').textContent   = msg;
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function respond(type) {
      if (type === 'accept') {
        openModal('🎊', "Ашгүй дээ!", "Чамайг ирж байгаад чинь баярлаж байна. 7-7 уулзацгаая! 🎂");
      } else {
        openModal('😢', "Эээээ", "Зүгээр дээ — чамд зүсэм тоорт хадгалнаа🍰");
      }
    }

    function addToCalendar() {
      const title    = encodeURIComponent("Халиунаа-ийн BDAY 🎉");
      const dates    = "20260607T150000/20260607T180000";
      const location = encodeURIComponent("Shangri-La mall Ruby Room restaurant");
      const details  = encodeURIComponent("Зөндээ хөгжилдөнө гэдэгт итгэлтэй байна!");
      const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&location=${location}&details=${details}`;
      window.open(url, '_blank');
      showToast("📆 Opening Google Calendar...");
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
